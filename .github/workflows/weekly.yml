name: Weekly

on:
  schedule:
    # Friday 10:00 UTC
    - cron: "0 10 * * 5"
  workflow_dispatch:

jobs:
  weekly:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run weekly script
        run: bin/weekly

      - name: Create pull request if changed
        uses: peter-evans/create-pull-request@v8
        with:
          branch: weekly/auto-updates
          commit-message: "Weekly script updates"
          title: "Weekly script updates"
          body: "Automated updates from the weekly scheduled run."
